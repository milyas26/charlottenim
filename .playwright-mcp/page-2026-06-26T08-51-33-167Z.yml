    - article [ref=e19]:
      - generic [ref=e20]:
        - paragraph [ref=e21]: Aksara bisa melihat dua detik ke masa depan.
        - paragraph [ref=e22]: Selalu dua detik. Tidak lebih, tidak kurang. Kemampuan ini muncul pertama kali saat ia berumur delapan tahun, ketika ia "melihat" gelas susu yang akan tumpah dua detik sebelum benar-benar tumpah.
        - paragraph [ref=e23]: Saat itu ia pikir semua orang bisa melakukannya. Ternyata tidak.
        - paragraph [ref=e24]: "Sekarang di umur dua puluh dua tahun, Aksara sudah terbiasa dengan kemampuannya. Ia menggunakannya untuk hal-hal kecil: menghindari percikan air dari motor yang lewat, menangkap barang sebelum jatuh, atau tahu kapan bosnya akan datang ke mejanya."
        - paragraph [ref=e25]: Tapi sejujurnya, kemampuan ini lebih sering merepotkan daripada membantu.
        - paragraph [ref=e26]: "\"Lo bisa lihat masa depan dua detik, tapi nggak bisa lihat soal UTS?\" canda Dion, sahabatnya."
        - paragraph [ref=e27]: Aksara hanya tersenyum tipis. Ia sudah berhenti menjelaskan bahwa kemampuannya tidak bekerja seperti itu. Ia tidak bisa memilih apa yang dilihat. Kadang ia melihat hal penting, kadang hanya melihat orang yang akan menguap.
        - paragraph [ref=e28]: Hari itu, Aksara sedang duduk di halte bus, menunggu angkutan yang selalu datang terlambat. Di sampingnya, seorang gadis membaca buku dengan sampul yang tidak ia kenali.
        - paragraph [ref=e29]: Aksara melirik. Lalu, tanpa sengaja, ia "melihat."
        - paragraph [ref=e30]: "Dua detik ke depan: gadis itu masih duduk, membaca bukunya. Sama seperti sekarang."
        - paragraph [ref=e31]: Tapi ada yang aneh.
        - paragraph [ref=e32]: Biasanya, penglihatannya selalu jelas. Selalu ada gambar, suara, atau sensasi. Tapi kali ini... kosong. Gadis itu ada, tapi di sekelilingnya hanyalah kehampaan putih. Seperti layar bioskop sebelum film dimulai.
        - paragraph [ref=e33]: Aksara mengerjap. Itu tidak pernah terjadi sebelumnya.
        - paragraph [ref=e34]: "\"Kamu kenapa?\" suara gadis itu membuatnya tersadar."
        - paragraph [ref=e35]: Aksara baru sadar ia sudah menatap terlalu lama. "Eh, maaf. Aku cuma... bukunya menarik."
        - paragraph [ref=e36]: Gadis itu tersenyum. "Ini? Ini novel debut. Nggak terkenal sih."
        - paragraph [ref=e37]: "\"Judulnya apa?\""
        - paragraph [ref=e38]: "\"Dua Detik Sebelum Kamu.\""
        - paragraph [ref=e39]: Darah Aksara berdesir. Judul itu... terlalu kebetulan.
        - paragraph [ref=e40]: "\"Aku Senja,\" kata gadis itu, mengulurkan tangan."
        - paragraph [ref=e41]: "\"Aksara.\""
        - paragraph [ref=e42]: Mereka bersalaman. Dan di saat tangan mereka bersentuhan, Aksara mencoba melihat lagi. Dua detik ke depan.
        - paragraph [ref=e43]: Lagi-lagi kosong. Bukan kosong seperti tidak terjadi apa-apa. Tapi kosong seperti... tidak ada masa depan.
        - paragraph [ref=e44]: Siapa gadis ini? Dan kenapa di masa depannya hanya ada kehampaan?
        - paragraph [ref=e45]: Bus datang. Senja menutup bukunya dan berdiri. "Kamu naik bus ini juga?"
        - paragraph [ref=e46]: Aksara mengangguk, meskipun sebenarnya ini bukan bus yang biasanya ia naiki.
        - paragraph [ref=e47]: Saat mereka duduk berdampingan di dalam bus, Aksara terus mencuri pandang. Setiap kali ia mencoba melihat masa depan Senja, yang ia dapatkan hanyalah putih. Selalu putih. Selalu kosong.
        - paragraph [ref=e48]: Dan untuk pertama kalinya dalam hidupnya, Aksara ingin tahu lebih banyak tentang seseorang yang masa depannya tidak bisa ia lihat.
