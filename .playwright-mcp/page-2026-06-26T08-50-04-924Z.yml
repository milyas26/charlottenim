    - article [ref=e19]:
      - generic [ref=e20]:
        - paragraph [ref=e21]: Hari itu hujan turun lebih deras dari biasanya. Raya berdiri di bawah atap perpustakaan, menatap langit kelabu dengan perasaan campur aduk. Ujian akhir semester tinggal dua minggu lagi, dan ia belum menyentuh separuh materi.
        - paragraph [ref=e22]: "\"Sial,\" gumamnya pelan, menyadari payungnya tertinggal di kos."
        - paragraph [ref=e23]: Perpustakaan kampus hampir tutup. Penjaga sudah mulai mematikan lampu di beberapa bagian. Raya memeluk buku-bukunya lebih erat, berharap hujan segera reda.
        - paragraph [ref=e24]: "\"Mau nebeng payung?\""
        - paragraph [ref=e25]: Suara itu datang dari sampingnya. Raya menoleh dan mendapati seorang laki-laki berdiri dengan payung hitam di tangan. Rambutnya sedikit basah, jaket denimnya memiliki noda air hujan. Tapi yang paling Raya ingat adalah matanya—hangat, seperti teh jahe di musim hujan.
        - paragraph [ref=e26]: "\"Aku Arga,\" katanya, setengah tersenyum. \"Aku lihat kamu sering di perpustakaan. Teknik Sipil, kan?\""
        - paragraph [ref=e27]: Raya mengangguk pelan. "Raya. Sastra Indonesia."
        - paragraph [ref=e28]: "\"Sastra? Pantas,\" Arga terkekeh. \"Wajahmu kayak orang yang habis baca lima novel sehari.\""
        - paragraph [ref=e29]: Raya tidak tahu harus tersinggung atau tersanjung. Tapi sebelum ia sempat menjawab, Arga sudah membuka payungnya lebih lebar.
        - paragraph [ref=e30]: "\"Ayo. Aku antar ke halte.\""
        - paragraph [ref=e31]: Dan entah kenapa, Raya menurut.
        - paragraph [ref=e32]: Mereka berjalan berdua di bawah payung hitam, melewati genangan air dan daun-daun basah. Pembicaraan mengalir ringan—tentang dosen killer, kantin kampus, dan film-film yang tidak mereka tonton. Hujan masih turun, tapi Raya hampir lupa ia tidak membawa payung.
        - paragraph [ref=e33]: Saat sampai di halte, Arga menutup payungnya. "Sampai ketemu lagi, Raya Sastra Indonesia."
        - paragraph [ref=e34]: Raya tersenyum. "Sampai ketemu, Arga Teknik Sipil."
        - paragraph [ref=e35]: Bus datang. Raya naik dan duduk di dekat jendela. Dari kaca, ia melihat Arga masih berdiri di halte, mengeluarkan earphone dan memasangnya. Sebelum pandangan terhalang, Raya melihat lelaki itu tersenyum kecil.
        - paragraph [ref=e36]: Dan untuk pertama kalinya dalam semester itu, Raya pulang tanpa memikirkan ujian.
